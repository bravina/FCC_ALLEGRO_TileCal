# =============================================================================
# FCC ALLEGRO batch workflow configuration
# =============================================================================
# Usage:
#   python batch/submit.py --config batch/config.yaml --steps gen sim reco merge ntuple
#   python batch/submit.py --config batch/config.yaml --steps sim reco  # skip gen
#   python batch/submit.py --config batch/config.yaml --dry-run         # generate files only
#
# Steps available: gen, sim, reco, merge, ntuple
# When multiple steps are given they are chained via HTCondor DAGMan.
# =============================================================================

# -----------------------------------------------------------------------------
# Paths
# -----------------------------------------------------------------------------
paths:
  # Top-level working directory (source code, scripts, configs)
  workdir: /afs/cern.ch/work/r/ravinab/public/FCC_ALLEGRO_TileCal

  # Where simulation/reconstruction output lands (EOS recommended for large files)
  runsdir: /eos/experiment/drdcalo/tileCal/ravinab/FCC_ALLEGRO_TileCal/runs

  # XRootD URL prefix for EOS writes from worker nodes (which cannot use FUSE /eos mount)
  eos_root_url: root://eosuser.cern.ch/

  # All batch files (DAGs, scripts, sub files, logs) go here.
  # Must be on EOS when using EosSubmit schedds (module load lxbatch/eossubmit).
  # Can be on AFS for small campaigns with the default schedd.
  submitdir: /eos/experiment/drdcalo/tileCal/ravinab//FCC_ALLEGRO_TileCal/batch/jobs
 
  # scriptsdir: if set, job .sh scripts go here and .sub/DAG files go to submitdir.
  # Leave unset (or same as submitdir) when using EosSubmit — everything on EOS.
  # scriptsdir: /eos/experiment/drdcalo/tileCal/ravinab//FCC_ALLEGRO_TileCal/batch/scripts


  # ALLEGRO geometry version
  allegro_version: ALLEGRO_o1_v03

  # Key4hep nightly to source. Use "latest" for the rolling nightly, or pin a date.
  # Example pinned: /cvmfs/sw-nightlies.hsf.org/key4hep/setup.sh -r 2026-04-08
  key4hep_setup: 2026-04-08   # "latest" -> sources without -r flag

  # Pandora settings XML (relative to ALLEGRO_PandoraPFA/run/, or absolute path)
  pandora_settings: PandoraSettings_v6.xml

  # Extra entries for LD_LIBRARY_PATH required by the local builds but not
  # provided by the Key4hep nightly. Add or remove as the nightly evolves.
  # These are injected verbatim into every job script.
  extra_ld_library_paths:
    - /cvmfs/sw-nightlies.hsf.org/key4hep/releases/2026-02-26/x86_64-almalinux9-gcc14.2.0-opt/xerces-c/3.3.0-kq5wkb/lib

# -----------------------------------------------------------------------------
# Package locations
# Two mutually exclusive modes per package:
#   local_path: /absolute/path   -> use this directory directly (pre-compiled)
#   git: {url: ..., branch: ...} -> clone into workdir/PackageName and compile
#
# The resolved install path for each package is passed into every job script,
# so changing local_path here is sufficient to point jobs at a different build.
#
# Run  `python batch/submit.py --config batch/config.yaml --setup`  to generate
# a setup_and_compile.sh from the git entries below, and follow the printed
# instructions before submitting any jobs.
# -----------------------------------------------------------------------------
packages:
  k4geo:
    local_path: /afs/cern.ch/work/r/ravinab/public/FCC_ALLEGRO_TileCal/k4geo

  k4RecTracker:
    local_path: /afs/cern.ch/work/r/ravinab/public/FCC_ALLEGRO_TileCal/k4RecTracker

  PandoraSDK:
    local_path: /afs/cern.ch/work/r/ravinab/public/FCC_ALLEGRO_TileCal/PandoraSDK

  LCContent:
    local_path: /afs/cern.ch/work/r/ravinab/public/FCC_ALLEGRO_TileCal/LCContent

  DDMarlinPandora:
    local_path: /afs/cern.ch/work/r/ravinab/public/FCC_ALLEGRO_TileCal/DDMarlinPandora

  CaloNtupleizer:
    local_path: /afs/cern.ch/work/r/ravinab/public/FCC_ALLEGRO_TileCal/CaloNtupleizer

  Pythia8:
    local_path: /afs/cern.ch/work/r/ravinab/public/FCC_ALLEGRO_TileCal/Pythia8

  ALLEGRO_PandoraPFA:
    local_path: /afs/cern.ch/work/r/ravinab/public/FCC_ALLEGRO_TileCal/ALLEGRO_PandoraPFA

# -----------------------------------------------------------------------------
# Workflow settings (per step)
# -----------------------------------------------------------------------------
workflow:
  gen:
    enabled: true
    events_per_job: 1000      # events generated per Pythia8 job
    job_flavour: longlunch     # HTCondor flavour (~2h); see https://batchdocs.web.cern.ch
    request_memory: 2GB
    retry_request_memory: 4GB

  sim:
    enabled: true
    events_per_job: 100        # ddsim --numberOfEvents per job
    job_flavour: longlunch
    request_memory: 8GB
    retry_request_memory: 10GB

  reco:
    enabled: true
    events_per_job: 500        # k4run events per job
    job_flavour: longlunch
    request_memory: 2GB
    retry_request_memory: 4GB

  merge:
    enabled: true
    events_per_merged_file: 1000   # hadd target: how many reco events per output file
    job_flavour: longlunch
    request_memory: 2GB
    retry_request_memory: 4GB

  ntuple:
    enabled: true
    job_flavour: longlunch
    request_memory: 4GB
    retry_request_memory: 6GB

# -----------------------------------------------------------------------------
# Samples
# Each entry defines one physics sample.
#
# Fields:
#   name        : unique label used for directory names and file names
#   card        : Pythia8 card path, relative to workdir or absolute
#   ecm         : list of centre-of-mass energies in GeV
#                 (each becomes a separate sub-sample, e.g. ttbar_ecm365)
#   base_seed   : starting random seed; job i gets seed = base_seed + i
#   total_events: total events to generate across all jobs
#
# The Pythia8 cards shipped with this repo:
#   Pythia8/cards/p8_ee_ttbar.cmd   ttbar, default 365 GeV
#   Pythia8/cards/p8_ee_WW.cmd      W+W-, default 240 GeV
#   Pythia8/cards/p8_ee_ZZ.cmd      ZZ,   default 240 GeV
#   Pythia8/cards/p8_ee_Zuds.cmd    Z->uds dijets, default 91.188 GeV
# -----------------------------------------------------------------------------
samples:

  # - name: ttbar
  #   card: Pythia8/cards/p8_ee_ttbar.cmd
  #   base_seed: 42
  #   total_events: 10000
  #   ecm:
  #     - 365

  # - name: WW
  #   card: Pythia8/cards/p8_ee_WW.cmd
  #   base_seed: 42
  #   total_events: 10000
  #   ecm:
  #     - 240

  # Energy scan: ttbar
  - name: ttbar_scan
    card: Pythia8/cards/p8_ee_ttbar.cmd
    base_seed: 42
    total_events: 1000
    ecm: [330, 332, 334, 336, 338, 340, 342, 344, 346, 348, 350, 355, 360, 365]

  # Energy scan: WW
  - name: WW_scan
    card: Pythia8/cards/p8_ee_WW.cmd
    base_seed: 42
    total_events: 1000
    ecm: [330, 332, 334, 336, 338, 340, 342, 344, 346, 348, 350, 355, 360, 365]

